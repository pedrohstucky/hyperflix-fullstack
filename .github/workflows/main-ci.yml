name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-validation:
    name: backend (Java 21 + Spring)
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'backend') || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Backend Tests
        run: mvn clean test
        working-directory: ./backend
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}

      - name: Verify build
        run: mvn package -DskipTests
        working-directory: ./backend

  frontend-validation:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'frontend') || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Production Build Check
        run: npm run build
        working-directory: ./frontend
